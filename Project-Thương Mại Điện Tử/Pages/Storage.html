<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storage</title>
    <link rel="stylesheet" href="../Styles/Storage.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
</head>

<body>
    <div class="category">
        <div class="boardleft">
            <h2><img src="../Asset/icon/Fire.png" alt=""> Ecommerce</h2>
            <p class="statistic"><img src="../Asset/icon/House.png" alt=""><a href="http://" class="statisticlink">Thống
                    kê</a>
            </p>
            <p class="Categories"><img src="../Asset/icon/Cash.png" alt=""><a href="../Pages/category.html"
                    class="CategoryLink">Danh mục</a></p>
            <p class="Product"><img src="../Asset/icon/IconProduct.png" alt=""><a href="http://" class="productlink">Sản
                    phẩm</a>
            </p>
        </div>
        <div class="boardright">
            <div class="headboardright">
                <i class="fa-solid fa-bell"></i>
                <img src="../Asset/Image/10d5c319419f2137bf8772f28aaf576b74a68518.png" alt="" onclick="ShowLogOutBtn()">
            </div>
            <hr class="line">
            <div class="Under">
                 <div class="underhead">
                <h2>Sản phẩm</h2>
                <button type="button" class="btnadd" onclick="UpformAddProduct()">Thêm mới sản phẩm</button>
            </div>
            <div class="searchfilter">
                <select name="" id="SelectBoxId" class="selectbox" onchange="FilterProductById()">
                    <option value="Tất cả">Lọc theo danh mục</option>
                    <!-- <option value="Ngừng hoạt động"></option>
                    <option value="Đang hoạt động"></option> -->
                </select>
                <select name="" id="" class="selectbox">
                    <option value="Tất cả">Lọc theo trạng thái</option>
                    <option value="Ngừng hoạt động"></option>
                    <option value="Đang hoạt động"></option>
                </select>
                <input type="search" class="searchbox" id="SearchBox" placeholder="Tìm kiếm sản phẩm theo tên " oninput="SearchProductByName()">
            </div>
            <div class="DashBoard">
                <div class="th">
                    <p>Mã sản phẩm</p>
                    <p>Tên sản phẩm</p>
                    <p>Giá</p>
                    <p>Số lượng</p>
                    <p>Giảm giá</p>
                    <p>Trạng thái</p>
                    <p>Chức năng</p>
                </div>
                <div class="ListCategories" id="ListCategories">
                    <!-- <div class="row">
                        <p class="idcategory">SP001</p>
                        <p class="namecategory">Iphone 12 Pro</p>
                        <p>12.000.000 đ</p>
                        <p>10</p>
                        <p>0%</p>
                        <p class="StatusActive"><span class="dotgreen"></span> Đang hoạt động</p>
                        <p><button id="btndelete"><img src="../Asset/Image/Button.png" alt=""></button>
                            <button id="btnedit"><img src="../Asset/Image/_Button base.png" alt=""></button>
                        </p>
                        <hr class="LineInList">
                    </div> -->
                </div>
            </div>
            </div>
            <div class="pageBut">
                <p class="pagebutton"><i class="fa-solid fa-arrow-left"></i></p>
                <p class="pagebutton">1</p>
                <p class="pagebutton">2</p>
                <p class="pagebutton">3</p>
                <p class="pagebutton">4</p>
                <p class="pagebutton">5</p>
                <p class="pagebutton">...</p>
                <p class="pagebutton">20</p>
                <p class="pagebutton"><i class="fa-solid fa-arrow-right"></i></p>
            </div>
            <div class="LogOutButton">
                        <button type="button" class="btnLogOut" onclick="LogOut()">Đăng xuất</button>
                    </div>
        </div>
    </div>
    <div class="AddProduct">
        <div class="headtitle">
            <h2>Thêm mới sản phẩm</h2>
            <button class="btncancel">X</button>
        </div>
        <div class="formvalue">
            <div class="headinput">
                <div class="idproduct">
                    <label for="">Mã sản phẩm <span class="symbol">*</span></label><br>
                    <input type="text" class="idinput" id="IdProductInput">
                </div>
                <div class="nameproduct">
                    <label for="">Tên sản phẩm <span class="symbol">*</span></label><br>
                    <input type="text" class="nameinput" id="NameProductInput">
                </div>
            </div>
            <div class="underheadinput">
                <div class="categoryunderinput">
                    <p>Danh mục <span class="symbol">*</span></p>
                    <select name="" id="selectcategory">
                        <option value="">Chọn danh mục</option>
                        <!-- <option value="Quần áo">Quần áo</option>
                        <option value="Thực phẩm">Thực phẩm</option> -->
                    </select>
                </div>
                <div class="statusproduct">
                    <div class="chose">
                        <p>Trạng thái</p>
                        <label for=""><input type="radio" name="status" class="status1" value="Active" id="Radio1"> Đang
                            hoạt động</label>
                        <label for=""><input type="radio" name="status" class="status" value="InActive" id="Radio2"> Ngừng hoạt
                            động</label>
                    </div>
                </div>
            </div>
            <div class="midinput">
                <div class="quantity">
                    <label for="" class="quantityname">Số lượng</label>
                    <input type="number" placeholder="1" id="QuantityProductInput">
                </div>
                <div class="price">
                    <label for="" class="pricename">Giá</label>
                    <input type="number" placeholder="10.000.000" step="1000" id="PriceProductInput">
                </div>
                <div class="discount">
                    <label for="" class="discountname">Giảm giá</label>
                    <input type="number" placeholder="10" id="DiscountProductInput">
                </div>
            </div>
            <div class="Inputimage">
                <label for="" class="image"> Hình ảnh <span class="symbol">*</span></label>
                <input type="text" id="ImageProductInput">
            </div>
            <div class="descproduct">
                <label for="" class="descproduct1">Chi tiết sản phẩm</label>
                <input type="text" id="DescInputProduct">
            </div>
            <hr class="lineinform">
            <div class="BtnInForm">
                <button class="BtnCancel" onclick="CloseformAddProducts()">Hủy</button>
                <button class="BtnConfirm" onclick = "AddProduct()">Thêm</button>
            </div>
        </div>
    </div>
    <div class="UpdateProduct">
        <div class="headtitle">
            <h2>Cập Nhật sản phẩm</h2>
            <button class="btncancel">X</button>
        </div>
        <div class="formvalue">
            <div class="headinput">
                <div class="idproduct">
                    <label for="">Mã sản phẩm <span class="symbol">*</span></label><br>
                    <input type="text" class="idinput">
                </div>
                <div class="nameproduct">
                    <label for="">Tên sản phẩm <span class="symbol">*</span></label><br>
                    <input type="text" class="nameinput">
                </div>
            </div>
            <div class="underheadinput">
                <div class="categoryunderinput">
                    <p>Danh mục <span class="symbol">*</span></p>
                    <select name="" id="selectcategory">
                        <option value="Điện thoại">Điện thoại</option>
                        <option value="Quần áo">Quần áo</option>
                        <option value="Thực phẩm">Thực phẩm</option>
                    </select>
                </div>
                <div class="statusproduct">
                    <div class="chose">
                        <p>Trạng thái</p>
                        <label for=""><input type="radio" name="status" class="status1" value="Active" checked> Đang
                            hoạt động</label>
                        <label for=""><input type="radio" name="status" class="status" value="InActive"> Ngừng hoạt
                            động</label>
                    </div>
                </div>
            </div>
            <div class="midinput">
                <div class="quantity">
                    <label for="" class="quantityname">Số lượng</label>
                    <input type="number" placeholder="1">
                </div>
                <div class="price">
                    <label for="" class="pricename">Giá</label>
                    <input type="number" placeholder="10.000.000" step="1000">
                </div>
                <div class="discount">
                    <label for="" class="discountname">Giảm giá</label>
                    <input type="number" placeholder="10">
                </div>
            </div>
            <div class="Inputimage">
                <label for="" class="image"> Hình ảnh <span class="symbol">*</span></label>
                <input type="text">
            </div>
            <div class="descproduct">
                <label for="" class="descproduct1">Chi tiết sản phẩm</label>
                <input type="text">
            </div>
            <hr class="lineinform">
            <div class="BtnInForm">
                <button class="BtnCancel" onclick="CloseformAddcategory()">Hủy</button>
                <button class="BtnConfirm">Thêm</button>
            </div>
        </div>
    </div>
    <script src="../JS/Storage.js"></script>
</body>

</html>
