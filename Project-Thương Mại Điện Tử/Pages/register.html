<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản</title>
    <link rel="stylesheet" href="../Styles/register.css">
</head>

<body>
    <span class="title">
        <h1>Đăng ký tài khoản</h1><br>
        <p>Đăng ký tài khoản để sử dụng dịch vụ</p><br>
    </span>
    <form action="">
        <span class="nameuser">
            <div class="firstname">
                <label for="firstnameuser">Họ và tên đệm</label><br>
                <input type="text" class="nameuserinput" id="firstnameuser">
                <p class="error-firstname"></p>
            </div>
            <div class="name">
                <label for="lastnameuser" class="namelabel9">Tên</label><br>
                <input type="text" class="nameuserinput" id="lastnameuser"><br>
                <p class="error-lastname"></p>
            </div>
        </span>
        <label class="namelabel1" for="emailuser">Email</label>
        <input type="email" class="userinput" id="emailuser" required>
        <p class="error-email"></p>
        <label class="namelabel2" for="password">Nhập mật khẩu</label>
        <input type="password" class="userinput" id="password" required>
        <p class="error-password"></p>
        <label class="namelabel" for="checkpassword">Xác nhận lại mật khẩu</label>
        <input type="password" class="userinput" id="checkpassword" required><br>
        <p class="error-checkpassword"></p>
        <span class="check">
            <input class="boxcheck" type="checkbox" id="checkboxsign">
            <label for="" class="checkdeal">Bạn đồng ý với <a href="http://" class="checkdeal" style="text-decoration:none">chính sách và điều khoản</a></label><br>
            <p class="error-checkbox"></p>
        </span>
        <button type="button" class="register" onclick="FormRegister()">Đăng ký</button>
        <p class="noteaccount">Bạn đã có tài khoản? <a href="./login.html" class="loginpage">Đăng nhập</a></p>
    </form>
    <div class="SignUpSucces">
        <p>✅ Bạn đã đăng ký thành công</p>
    </div>
    <script src="../JS/register.js"></script>
</body>

</html>
