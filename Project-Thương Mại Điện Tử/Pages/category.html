<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../Styles/category.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
</head>

<body>
    <div class="category">
        <div class="boardleft">
            <h2><i class="fa-solid fa-fire"></i>Ecommerce</h2>
            <p class="statistic"><i class="fa-solid fa-house"></i><a href="http://" class="statisticlink">Thống kê</a>
            </p>
            <p class="Categories"><i class="fa-solid fa-layer-group"></i>Danh mục</p>
            <p class="Product"><i class="fa-regular fa-folder"></i><a href="../Pages/Storage.html"
                    class="productlink">Sản phẩm</a></p>
        </div>
        <div class="boardright">
            <div class="headboardright">
                <i class="fa-solid fa-bell"></i>
                <img src="../Asset/Image/10d5c319419f2137bf8772f28aaf576b74a68518.png" alt="" onclick="ShowLogOutBtn()">
            </div>
            <hr class="line">
            <div class="underhead">
                <h2>Danh mục</h2>
                <button type="button" class="btnadd" onclick="UpformAddcategory()">Thêm mới danh mục</button>
            </div>
            <div class="searchfilter">
                <select name="" id="SelectBox" class="selectbox" onchange="FilterStatus()">
                    <option value="Tất cả">Tất cả</option>
                    <option value="INACTIVE">Ngừng hoạt động</option>
                    <option value="ACTIVE">Đang hoạt động</option>
                    <option value="SortByName">Sắp xếp theo tên</option>
                    <option value="SortByCreateAt">Sắp xếp theo thời gian tạo</option>

                </select>
                <i class="fa-solid fa-magnifying-glass" id="shape"></i>
                <input type="search" class="searchbox1" id="SearchBox" placeholder="Tìm kiếm danh mục theo tên"
                    oninput="SearchCategoryByName()">
            </div>
            <div class="DashBoard">
                <div class="th">
                    <p>Mã danh mục <i class="fa-solid fa-arrow-down"></i></p>
                    <p>Tên danh mục <i class="fa-solid fa-arrow-down"></i></p>
                    <p>Trạng thái</p>
                    <p>Chức năng</p>
                </div>
                <div id="ListCategories">
                    <!-- <div class="row">
                    <p class="idcategory">DM001</p>
                    <p class="namecategory">Quần áo</p>
                    <p class="StatusActive"><span class="dotgreen"></span> Đang hoạt động</p>
                    <p><button id="btndelete"><img src="../Asset/Image/Button.png" alt=""></button>
                        <button id="btnedit" onclick="UpFormUpdateCategory()"><img src="../Asset/Image/_Button base.png" alt=""></button>
                    </p>
                    <hr class="LineInList">
                    </div> -->
                </div>
            </div>
            <div class="pageBut" id="pagination">
                <!-- <p class="pagebutton"><i class="fa-solid fa-arrow-left"></i></p>
                <p class="pagebutton">1</p>
                <p class="pagebutton">2</p>
                <p class="pagebutton">3</p>
                <p class="pagebutton">4</p>
                <p class="pagebutton">5</p>
                <p class="pagebutton">...</p>
                <p class="pagebutton">12</p>
                <p class="pagebutton"><i class="fa-solid fa-arrow-right"></i></p> -->
            </div>
            <div class="LogOutButton">
                <button type="button" class="btnLogOut" onclick="LogOut()">Đăng xuất</button>
            </div>
        </div>
    </div>
    <div class="FormAddCategory">
        <h2>Thêm mới danh mục</h2><br>

        <label for="idcatoinput" class="AddIdCategory">Mã danh mục <span class="symbol">*</span></label><br>
        <input type="text" name="idcatoinput" class="AddIdCategoryInput" id="AddIdCategory"><br><br><br>
        <label for="namecatoinput" class="AddNameCategory">Tên Danh mục <span class="symbol">*</span></label><br><br>
        <input type="text" name="namecatoinput" class="AddNameCategoryInput" id="AddNameCategory">

        <div class="chooseStatus">
            <p>Trạng thái</p><br>
            <label class="radio">
                <input type="radio" name="status" id="radio1" value="Active">
                <span class="checkmark"></span>
                Đang hoạt động
            </label>

            <label class="radio">
                <input type="radio" id="radio2" name="status" value="InActive">
                <span class="checkmark"></span>
                Ngừng hoạt động
            </label>
        </div>
        <hr class="LineInFormAddCategory">
        <div class="BtnInForm">
            <button class="BtnCancel" onclick="CloseformAddcategory()">Hủy</button>
            <button class="BtnConfirm" onclick="AddCategories()">Thêm</button>

        </div>
    </div>
    <div class="FormUpdateCategory">
        <h2>Cập nhật danh mục</h2><br>

        <label for="idcatoinput" class="AddIdCategory">Mã danh mục <span class="symbol">*</span></label><br>
        <input type="text" name="idcatoinput" class="AddIdCategoryInput" id="UpdateIdCategoryInput"
            placeholder="  DM001"><br><br><br>
        <label for="namecatoinput" class="AddNameCategory">Tên Danh mục <span class="symbol">*</span></label><br><br>
        <input type="text" name="namecatoinput" class="AddNameCategoryInput" id="UpdateNameCategoryInput"
            placeholder="  Quần áo">

        <div class="chooseStatus">
            <p>Trạng thái</p><br>
            <label class="radio">
                <input type="radio" name="status" id="radio3" value="Active">
                <span class="checkmark"></span>
                Đang hoạt động
            </label>
            <label class="radio">
                <input type="radio" name="status" id="radio4" value="InActive">
                <span class="checkmark"></span>
                Ngừng hoạt động
            </label>
        </div>
        <hr class="LineInFormAddCategory">
        <div class="BtnInForm">
            <button class="BtnCancel" onclick="CloseFormUpdateCategory()">Hủy</button>
            <button class="BtnConfirm" onclick="ConfirmUpdate()">Cập nhật</button>

        </div>
    </div>
    <div id="confirmBox" class="overlay">
    <div class="confirm-modal">
        <div class="icon">!</div>

        <h3>Xác nhận</h3>
        <p>Bạn có chắc chắn muốn xóa sản phẩm Tạo đó khỏi hệ thống không?</p>

        <div class="actions">
            <button class="btn-cancel" onclick="CloseConfirmDelete()">Hủy</button>
            <button class="btn-delete" onclick="ConfirmDelete()">Xóa</button>
        </div>
    </div>
    <!-- <div class="confirm-modal-logOut">
        <div class="icon">!</div>

        <h3>Xác nhận</h3>
        <p>Bạn có chắc chắn muốn đăng xuất?</p>

        <div class="actions">
            <button class="btn-cancel" onclick="CloseConfirmDelete()">Hủy</button>
            <button class="btn-delete" onclick="ConfirmDelete()">Xóa</button>
        </div>
    </div> -->
</div>
    <script src="../JS/category.js"></script>
</body>

</html>
