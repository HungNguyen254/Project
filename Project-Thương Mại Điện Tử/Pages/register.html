<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../Styles/register.css">
</head>

<body>
    <span class="title">
        <h1>Đăng ký tài khoản</h1><br>
        <p>Đăng ký tài khoản để sử dụng dịch vụ</p><br>
    </span>
    <form action="">
        <span class="nameuser">
            <label for="">Họ và tên đệm</label><br>
            <input type="text" class="nameuserinput" id="firstnameuser">
            <span class="name">
                <label for="">Tên</label><br>
                <input type="text" class="nameuserinput" id="lastnameuser"><br>
            </span>
        </span>
        <label class="namelabel" for="">Email</label>
        <input type="email" class="userinput" id="emailuser" placeholder="Nhập Email của bạn vào đây">
        <label class="namelabel" for="">Nhập mật khẩu</label>
        <input type="password" class="userinput" id="password" placeholder="Nhập Mật Khẩu ">
        <label class="namelabel" for="">Xác nhận lại mật khẩu</label>
        <input type="password" class="userinput" id="checkpassword" placeholder="Xác nhận lại mật khẩu của bạn"><br>
        <span class="check">
            <input class="boxcheck" type="checkbox">
            <label for="">Bạn đồng ý với <a href="http://" style="text-decoration:none">chính sách và điều
                    khoản</a></label><br>
        </span>
        <button type="button" class="register">Đăng ký</button>
        <p class="noteaccount">Bạn đã có tài khoản? <a href="./login.html">Đăng nhập</a></p>
    </form>

    <script src="../JS/register.js"></script>
</body>

</html>
