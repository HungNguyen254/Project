<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập tài khoản</title>
    <link rel="stylesheet" href="../Styles/login.css">
</head>
<body>
    <div class="title">
    <h1>Đăng Nhập</h1>
    <p>Đăng nhập tài khoản để sử dụng hệ thống quản lý</p>
    
    <form action="">
        <span class="valueinput">
             <label for="">Email</label><br>
        <input type="email" id="email" required><br>
        <p class="error-emaillogin"></p>
        <label for="">Mật khẩu</label> <br>
        <input type="password" id="password" required><br>
        <p class="error-passwordlogin"></p>
        </span>
        <span class="note">
            <input type="checkbox">
            <label for="">Nhớ tài khoản</label>
            <a href="http://" class="forgotlink">Quên mật khẩu</a><br>
        </span>
        <button type="button" onclick="FormLogin()" class="btnlogin" >Đăng nhập</button>
        <p style="margin-left:100px;margin-top:10px">Bạn chưa có tài khoản? <a href="../Pages/register.html" class="registerlink">Đăng ký</a></p>
    </form>
    <script src="../JS/login.js"></script>
</body>
</html>
