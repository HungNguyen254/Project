<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang chủ Cyber</title>
    <link rel="stylesheet" href="../Styles/Main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <header>
        <div class="headtitle">
            <img src="../Asset/Image/Logo Vector.png" alt="">
            <input type="search" class="searchbox" placeholder="Tìm kiếm">
            <h2>Trang chủ</h2>
            <h4>Giới thiệu</h4>
            <h4>Liên hệ</h4>
            <p class="favorite">
                <i class="fa-regular fa-heart"></i>
            </p>
            <p class="cart">
                <i class="fa-solid fa-cart-shopping"></i>
            </p>
            <p class="profile">
                <i class="fa-regular fa-user"></i>
            </p>            
        </div>
        <div class="undertitle">
            <p><img src="../Asset/icon/PhoneIcon.png" alt=""> Điện thoại</p>
            <p>|</p>
            <p><img src="../Asset/icon/LaptopIcon.png" alt=""> Laptop</p>
            <p>|</p>
            <p><img src="../Asset/icon/ClockIcon.png" alt=""> Đồng hồ thông minh</p>
            <p>|</p>
            <p><img src="../Asset/icon/CameraIcon.png" alt=""> Cameras</p>
            <p>|</p>
            <p><img src="../Asset/icon/HeadphonesIcon.png" alt=""> Tai nghe</p>
            <p>|</p>
            <p><img src="../Asset/icon/GamingIcon.png" alt=""> Gaming</p>
        </div>
    </header>
    <main>
        <img src="../Asset/Image/Banner.png" alt="" class="banner">
        <div class="TitleCategoryProduct">
            <h2>Danh mục sản phẩm</h2>
            <div class="buttonarrow">
                <img src="../Asset/icon/ArrowLeft.png" alt="">
                <img src="../Asset/icon/ArrowRight.png" alt="">
            </div>
        </div>
    </main>
</body>

</html>
